# ============================================================
#  Avellaneda-Stoikov Pipeline Configuration
# ============================================================

data:
  source: synthetic          # 'synthetic' | 'csv'
  csv_path: data/ticks.csv   # used if source == 'csv'
  n_ticks: 50000             # synthetic ticks to generate
  seed: 42

synthetic_params:
  mid_price_start: 100.0
  sigma_true: 0.02           # true volatility for generator
  lambda_true: 5.0           # true arrival intensity (per second)
  kappa_true: 1.5            # true fill-rate decay
  dt: 1.0                    # seconds per tick

calibration:
  method: mle
  window_size: 500           # rolling window for λ estimation
  confidence_level: 0.95
  bootstrap_samples: 1000
  output_path: results/calibrated_params.json

model:
  gamma: 0.1                 # risk aversion parameter
  T: 1.0                     # trading horizon (normalized)
  min_spread: 0.001          # minimum quoted spread
  max_inventory: 50          # hard inventory limit (units)

backtest:
  initial_cash: 1_000_000
  initial_inventory: 0
  lot_size: 1
  transaction_cost: 0.0001   # per unit traded
  inventory_penalty: 0.001   # quadratic inventory cost weight
  output_path: results/

reporting:
  produce_html: true
  produce_plots: true
  figures_path: results/figures/
